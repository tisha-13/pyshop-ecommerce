{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row">

        <div class="col-md-6">
            <img src="{{ product.image_url }}"
                 class="img-fluid rounded shadow"
                 style="width:100%; max-height:450px; object-fit:cover;">
        </div>

        <div class="col-md-6">

            <h2>{{ product.name }}</h2>

            <h3 class="text-success">
                ${{ product.price }}
            </h3>

            <hr>

            <p>
                This is a high-quality {{ product.name }} available at PyShop.
            </p>

            <a href="{% url 'products:add_to_cart' product.id %}"
               class="btn btn-primary btn-lg">
                Add to Cart
            </a>

            <a href="{% url 'products:index' %}"
               class="btn btn-secondary btn-lg">
                Back
            </a>

        </div>

    </div>

</div>

{% endblock %}
