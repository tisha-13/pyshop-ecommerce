<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <title>PyShop</title>
</head>

<body style="background:#f8f9fa;">

<nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">

    <a class="navbar-brand" href="{% url 'products:index' %}">
        <strong>PyShop</strong>
    </a>

    <button class="navbar-toggler"
            type="button"
            data-toggle="collapse"
            data-target="#navbarSupportedContent">

        <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">

        <ul class="navbar-nav mr-auto">

            <li class="nav-item">
                <a class="nav-link" href="{% url 'products:index' %}">
                    Home
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'products:index' %}">
                    Products
                </a>
            </li>

            <li class="nav-item">
               <a class="nav-link" href="{% url 'products:cart' %}">
    🛒 Cart ({{ cart_count }})
</a>
            </li>

        </ul>

        <form class="form-inline my-2 my-lg-0"
      action="{% url 'products:index' %}"
      method="GET">

    <input class="form-control mr-sm-2"
           type="search"
           name="search"
           placeholder="Search Products">

    <button class="btn btn-outline-primary"
            type="submit">
        Search
    </button>

</form>

    </div>

</nav>

<main class="mt-4">

    {% block content %}
    {% endblock %}

</main>

<footer class="text-muted mt-5">
    <div class="container text-center">
        <p>
            © 2026 PyShop | Built using Django & Bootstrap by
            <strong>
                <a href="https://github.com/tisha-13" target="_blank">
                    tisha-13
                </a>
            </strong>
        </p>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

</body>
</html>
